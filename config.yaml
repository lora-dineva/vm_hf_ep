# Video description pipeline configuration.
# CLI arguments override these values when provided.

# --- Input / output ---
video: "test_clip_60s.mp4"
scenes_dir: "scenes"
frames_dir: "frames"

# --- Scene splitting ---
scene_detector: "transnetv2"        # transnetv2 | adaptive | content | threshold

# --- Scene description (Qwen3-VL) ---
endpoint: "https://rjk11aiy6oefykan.us-east-1.aws.endpoints.huggingface.cloud"
model: "Qwen/Qwen3-VL-8B-Instruct"
max_tokens: 1024

# Video sampling (qwen-vl-utils)
fps: 2.0
max_frames: 120
image_patch_size: 16
jpeg_quality: 85

# Langfuse prompt management (requires LANGFUSE env vars)
prompt_name: "video-description"
prompt_label: "production"
fallback_prompt: "Describe the video."

# --- Final description (merge scenes into one narrative) ---
final_endpoint: ""                  # blank = use HF_FINAL_ENDPOINT env or built-in default
final_model: "mistralai/Mistral-Nemo-Instruct-2407"
final_max_tokens: 2048
